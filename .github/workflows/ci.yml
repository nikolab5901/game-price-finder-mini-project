name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.26"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: pytest
        run: uv run pytest -q
